<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDoApp</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="todo-app">
      <header>
        <h1>My Task</h1>
      </header>

      <main>
        <section id="input-section">
          <input
            type="text"
            id="todo-input"
            placeholder="Add a new task..."
            maxlength="50"
          />
          <button id="add-btn" onclick="addTask()">+</button>
        </section>

        <section id="list-section">
          <ul id="todo-list">
            <li id="1782278937000">
              <span class="taskText"> Task1 </span>
              <div class="taskControls">
                <span class="markComplete">✓</span>
                <span class="removeTask" onclick="remove(event)">X</span>
              </div>
            </li>
            <li id="1782278937199">
              <span class="tastText"> Task2 </span>
              <div class="taskControls">
                <span class="markComplete">✓</span>
                <span class="removeTask" onclick="remove(event)">X</span>
              </div>
            </li>
          </ul>
        </section>
      </main>

      <footer>
        <button id="clear-all-btn" onclick="clearAll()">Clear All</button>
      </footer>
    </div>
  </body>
  <script src="script.js" defer></script>
</html>
